name: Update SKU Catalog
on:
  repository_dispatch:
    types: [add-sku-event]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update JSON
        shell: bash
        run: |
          # Use Python to safely update the JSON file
          python3 -c "
          import json, os
          with open('catalog.json', 'r') as f:
              data = json.load(f)
          
          payload = ${{ toJson(github.event.client_payload) }}
          sku = payload['sku']
          
          if payload['action'] == 'delete':
              if sku in data: del data[sku]
          else:
              data[sku] = {
                  'sku': sku,
                  'desc': payload['desc'],
                  'imgBase64': payload['img'],
                  'updated': payload['updated']
              }
          
          with open('catalog.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
      - name: Commit and Push
        run: |
          git config --global user.name "SKU-Bot"
          git config --global user.email "actions@github.com"
          git add catalog.json
          git commit -m "Update SKU: ${{ github.event.client_payload.sku }}"
          git push
